- tags: packages
  block:
    - apt: name={{ web_packages }} cache_valid_time=3600
      when: ansible_os_family == "Debian"
    - dnf: name={{ web_packages }}
      when: ansible_os_family == "RedHat"
    - package: name=curl
    - pip: name=requests
- tags: deploy
  block:
    - user: name={{ app_user }} shell=/bin/bash
    - file: path={{ app_dir }} state=directory owner={{ app_user }} mode=0750
    - copy: content=secret={{ app_secret }} dest={{ app_dir }}/app.env
      notify: restart web container
    - stat: path={{ app_dir }}/.deployed
      register: marker
    - git: repo=https://github.com/octocat/Hello-World.git dest={{ app_dir }}/src
    - command: git --version
      register: git_ver
      changed_when: false
    - shell: date -u > {{ app_dir }}/.deployed
      when: not marker.stat.exists
    - service: name=cron state=started enabled=yes
    - community.docker.docker_container: name={{ web_container }} image={{ web_image }} published_ports=127.0.0.1:{{ web_port }}:80
      delegate_to: localhost
- tags: healthcheck
  block:
    - uri: url=http://127.0.0.1:{{ web_port }}
      delegate_to: localhost
